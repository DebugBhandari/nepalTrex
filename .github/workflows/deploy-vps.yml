name: Deploy VPS

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: deploy-vps-main
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install npm 11
        run: npm install -g npm@11

      - name: Copy Project To VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "."
          target: "/tmp/nepaltrex-${{ github.sha }}"

      - name: Deploy And Restart App
        uses: appleboy/ssh-action@v1.2.0
        env:
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          VPS_APP_NAME: ${{ secrets.VPS_APP_NAME }}
          VPS_APP_PORT: ${{ secrets.VPS_APP_PORT }}
          VPS_ENV_FILE: ${{ secrets.VPS_ENV_FILE }}
          DEPLOY_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          envs: VPS_APP_DIR,VPS_APP_NAME,VPS_APP_PORT,VPS_ENV_FILE,DEPLOY_SHA
          script_stop: true
          script: |
            set -euo pipefail

            APP_DIR="$VPS_APP_DIR"
            RELEASE_DIR="/tmp/nepaltrex-$DEPLOY_SHA"
            APP_NAME="${VPS_APP_NAME:-nepaltrex}"
            APP_PORT="${VPS_APP_PORT:-3000}"

            # ssh-action runs a non-login shell; load common profile scripts so node/npm in nvm are available.
            set +u
            if [ -f "$HOME/.profile" ]; then
              . "$HOME/.profile"
            fi
            if [ -f "$HOME/.bashrc" ]; then
              . "$HOME/.bashrc"
            fi
            if [ -s "$HOME/.nvm/nvm.sh" ]; then
              . "$HOME/.nvm/nvm.sh"
              nvm use 20.19.0 >/dev/null 2>&1 || true
            fi
            set -u

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm not found. Installing Node.js LTS via nvm..."
              if [ ! -d "$HOME/.nvm" ]; then
                if command -v curl >/dev/null 2>&1; then
                  curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
                elif command -v wget >/dev/null 2>&1; then
                  wget -qO- https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh | bash
                else
                  echo "Neither curl nor wget is available to install nvm." >&2
                  exit 127
                fi
              fi

              set +u
              . "$HOME/.nvm/nvm.sh"
              nvm install 20.19.0
              nvm use 20.19.0
              set -u
            fi

            if ! command -v npm >/dev/null 2>&1; then
              echo "npm is still unavailable after Node install attempt." >&2
              exit 127
            fi

            NPM_GLOBAL_PREFIX="$(npm config get prefix)"
            export PATH="$NPM_GLOBAL_PREFIX/bin:$PATH"

            mkdir -p "$APP_DIR"

            rsync -az --delete \
              --exclude ".git" \
              --exclude ".github" \
              --exclude "node_modules" \
              "$RELEASE_DIR/" "$APP_DIR/"

            if [ -n "${VPS_ENV_FILE:-}" ]; then
              printf '%s\n' "$VPS_ENV_FILE" > "$APP_DIR/.env"
              # Ensure production domain is always used regardless of secret value
              sed -i 's|^NEXTAUTH_URL=.*|NEXTAUTH_URL=https://nepaltrex.com|' "$APP_DIR/.env"
              sed -i 's|^MINIO_PUBLIC_URL=.*|MINIO_PUBLIC_URL=https://nepaltrex.com|' "$APP_DIR/.env"
              sed -i 's|^NEXT_PUBLIC_MINIO_PUBLIC_URL=.*|NEXT_PUBLIC_MINIO_PUBLIC_URL=https://nepaltrex.com|' "$APP_DIR/.env"
              # Copy .env to app subdirectory so Next.js can find it during build
              cp "$APP_DIR/.env" "$APP_DIR/app/.env"
            fi

            cd "$APP_DIR"
            npm ci
            cd app
            npx next build

            if ! command -v npx >/dev/null 2>&1; then
              echo "npx is unavailable after npm install." >&2
              exit 127
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              echo "pm2 is unavailable even after global install." >&2
              exit 127
            fi

            pm2 delete "$APP_NAME" >/dev/null 2>&1 || true
            pm2 start npx --name "$APP_NAME" --cwd "$APP_DIR/app" -- next start -p "$APP_PORT"
            pm2 save || true
            pm2 status "$APP_NAME" || true

            rm -rf "$RELEASE_DIR"